name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: mvn test
        env:
          SPRING_PROFILES_ACTIVE: ci

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -Dspring.profiles.active=prod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: feature-management-jar
          path: target/feature-management-*.jar
          if-no-files-found: error

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: feature-management-jar
          path: deploy

      - name: Deploy and smoke test
        run: |
          JAR=$(ls deploy/feature-management-*.jar)
          echo "Starting production deployment with $JAR"
          java -jar "$JAR" --spring.profiles.active=prod &
          APP_PID=$!

          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/flags > /dev/null; then
              echo "Smoke test passed: service is healthy"
              kill "$APP_PID"
              wait "$APP_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done

          echo "Smoke test failed: service did not become healthy"
          kill "$APP_PID" 2>/dev/null || true
          exit 1
